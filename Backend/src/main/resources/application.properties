# =====================================================
# Vistara Backend Configuration - Development
# =====================================================

# Server Configuration
server.port=${PORT:8081}
server.servlet.context-path=/api/v1

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vistara_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:00000000}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# =====================================================
# Flyway Migration Configuration - DISABLED
# =====================================================
spring.flyway.enabled=false

# =====================================================
# JWT Configuration
# =====================================================
jwt.secret=${JWT_SECRET:VistaraSecretKey2025ForTouristTrackingSystemSuperSecure123456789}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# =====================================================
# Mail Configuration - DISABLED for development
# =====================================================
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.mail.from=noreply@vistara.com
app.mail.from-name=Vistara Tourist Tracking System

# =====================================================
# Google Maps API
# =====================================================
google.maps.api.key=${GOOGLE_MAPS_API_KEY:YOUR_GOOGLE_MAPS_API_KEY_HERE}

# =====================================================
# Logging
# =====================================================
logging.level.com.vistara=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.mail=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=INFO

# =====================================================
# File Upload
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

