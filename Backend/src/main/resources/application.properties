# =====================================================
# Vistara Backend Configuration
# =====================================================

# Server Configuration
server.port=8087
server.servlet.context-path=/api/v1

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/vistara_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =====================================================
# Flyway Migration Configuration
# =====================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# JWT Configuration
jwt.secret=VistaraSecretKey2025ForTouristTrackingSystemSuperSecure123456789
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# =====================================================
# Mail Configuration
# =====================================================

# SMTP server ? using Gmail as the default provider.
# For other providers swap the host/port:
#   Outlook/Hotmail : smtp.office365.com  / 587
#   Yahoo           : smtp.mail.yahoo.com / 587
#   Mailgun (SMTP)  : smtp.mailgun.org    / 587
#   SendGrid (SMTP) : smtp.sendgrid.net   / 587  (username = "apikey", password = your SendGrid API key)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=lawrencedenzel60@gmail.com
spring.mail.password=qylgxjllybgkpahx

# TLS/STARTTLS ? required by Gmail and most modern SMTP providers
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# The "from" address that appears in the email header
# Must match (or be an alias of) spring.mail.username for Gmail
app.mail.from=lawrencedenzel60@gmail.com
app.mail.from-name=Vistara Tourist Tracking System

# =====================================================
# Google Maps API
# =====================================================
google.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY_HERE

# =====================================================
# Logging
# =====================================================
logging.level.com.vistara.tourist_tracking_system=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.mail=DEBUG

# =====================================================
# File Upload
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# WebSocket
# =====================================================
spring.websocket.path=/ws

