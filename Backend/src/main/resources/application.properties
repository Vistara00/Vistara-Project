spring.application.name=tourist-tracking-system

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Database Configuration - VERIFY these credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/vistara_db
spring.datasource.username=vistara_admin
spring.datasource.password=Vistara@2025
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Dialect - Set explicitly to avoid auto-detection issues
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool Configuration (add these for better debugging)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000

# JWT Configuration
jwt.secret=VistaraSecretKey2025ForTouristTrackingSystemSuperSecure
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Google Maps API
google.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY

# Logging - Enable to see connection issues
logging.level.com.vistara.tourist_tracking_system=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket
spring.websocket.path=/ws