# =====================================================
# Vistara Backend Configuration
# =====================================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/vistara_db
spring.datasource.username=postgres
spring.datasource.password=00000000
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =====================================================
# Flyway Migration Configuration
# =====================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# JWT Configuration
jwt.secret=VistaraSecretKey2025ForTouristTrackingSystemSuperSecure123456789
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Google Maps API
google.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY_HERE

# Logging
logging.level.com.vistara.tourist_tracking_system=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket
spring.websocket.path=/ws