# =====================================================
# Google Maps API
# =====================================================
google.maps.api.key=${GOOGLE_MAPS_API_KEY:YOUR_GOOGLE_MAPS_API_KEY_HERE}

# =====================================================
# Logging
# =====================================================
logging.level.com.vistara.tourist_tracking_system=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.org.flywaydb=${LOG_LEVEL_FLYWAY:DEBUG}
logging.level.org.springframework.mail=${LOG_LEVEL_MAIL:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:OFF}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_HIBERNATE_BINDER:OFF}

# =====================================================
# File Upload
# =====================================================
