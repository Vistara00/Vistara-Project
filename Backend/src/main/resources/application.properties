# =====================================================
# Vistara Backend Configuration
# =====================================================

# Server Configuration
server.port=${PORT:8087}
server.servlet.context-path=/api/v1

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vistara_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:00000000}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Hibernate Configuration - FIXED: Remove explicit dialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:true}
# spring.jpa.properties.hibernate.dialect is REMOVED - let Spring Boot auto-detect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =====================================================
# Flyway Migration Configuration
# =====================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# =====================================================
# JWT Configuration
# =====================================================
jwt.secret=${JWT_SECRET:VistaraSecretKey2025ForTouristTrackingSystemSuperSecure123456789}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# =====================================================
# Mail Configuration
# =====================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:lawrencedenzel60@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nijimhciwuhpzzlo}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:lawrencedenzel60@gmail.com}
