<!-- src/app/components/qr-modal/qr-modal.html -->
<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeModal()">&times;</button>
    
    <div class="modal-header">
      <h3>
        <i class="fas fa-qrcode"></i> 
        {{ isTouristMode ? 'My Booking QR Code' : 'Booking QR Code' }}
      </h3>
      <span class="booking-ref">{{ bookingReference }}</span>
    </div>

    <div class="modal-body">
      <div *ngIf="qrLoading" class="qr-loading">
        <i class="fas fa-spinner fa-spin"></i> Generating QR Code...
      </div>

      <div *ngIf="errorMessage" class="qr-error">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <div *ngIf="!qrLoading && qrImageUrl" class="qr-container">
        <div class="qr-wrapper">
          <img [src]="qrImageUrl" alt="QR Code" class="qr-image"/>
        </div>
        
        <div class="qr-info">
          <div class="info-row">
            <span class="info-label">Visitor:</span>
            <span class="info-value">{{ visitorName }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Check-in:</span>
            <span class="info-value">{{ checkInDate | date:'MMM d, y' }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Check-out:</span>
            <span class="info-value">{{ checkOutDate | date:'MMM d, y' }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Status:</span>
            <span class="status-badge" [ngClass]="paymentStatus === 'PAID' ? 'status-paid' : 'status-pending'">
              {{ paymentStatus }}
            </span>
          </div>
        </div>
      </div>

      <div *ngIf="!qrLoading && !qrImageUrl && !errorMessage" class="qr-placeholder">
        <i class="fas fa-qrcode"></i>
        <p>No QR code available</p>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" (click)="closeModal()">
        <i class="fas fa-times"></i> Close
      </button>
      <button class="btn-primary" *ngIf="qrImageUrl" (click)="downloadQR()">
        <i class="fas fa-download"></i> Download
      </button>
    </div>
  </div>
</div>
