<!-- src/app/pages/dashboard/dashboard.html -->
<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="brand">
      <img src="/assets/images/logo.png" alt="Vistara" class="brand-img" width="36" height="36" />
      <span class="brand-name">Vistara Portal</span>
    </div>

    <ul class="nav-list" role="menu">
      <li class="nav-item" routerLink="/dashboard" routerLinkActive="active"><i
          class="fas fa-tachometer-alt"></i><span>Dashboard</span></li>
      <li class="nav-item" routerLink="/dashboard/tracking" routerLinkActive="active"><i
          class="fas fa-map-marked-alt"></i><span>Live Tracking</span></li>
      <li class="nav-item" routerLink="/dashboard/checkins" routerLinkActive="active"><i
          class="fas fa-sign-in-alt"></i><span>Check-ins / Outs</span></li>
      <li class="nav-item" routerLink="/dashboard/bookings" routerLinkActive="active"><i
          class="fas fa-calendar-alt"></i><span>Bookings</span></li>
      <li class="nav-item" routerLink="/dashboard/alerts" routerLinkActive="active"><i
          class="fas fa-exclamation-triangle"></i><span>SOS Alerts</span></li>
      <!-- <li class="nav-item" routerLink="/dashboard/records" routerLinkActive="active"><i class="fas fa-users"></i><span>Visitor Records</span></li> -->
      <li class="nav-item" routerLink="/dashboard/reports" routerLinkActive="active"><i
          class="fas fa-chart-line"></i><span>Reports</span></li>
    </ul>

    <div class="sidebar-gap"></div>

    <button class="broadcast-btn" routerLink="/dashboard/broadcast" routerLinkActive="active"><i class="fas fa-bullhorn"></i><span>Broadcast Alerts</span></button>

    <ul class="nav-list secondary">
      <li class="nav-item" routerLink="/dashboard/settings" routerLinkActive="active"><i
          class="fas fa-cog"></i><span>Settings</span></li>
      <li class="nav-item" (click)="onLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></li>
    </ul>
  </nav>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <div class="search">
        <input type="search" placeholder="Search visitors or alerts…" aria-label="Search visitors or alerts" />
      </div>
      <div class="topbar-right">
        <div class="notification">
          <i class="fa fa-bell"></i>
        </div>

        <div class="profile-area" (click)="toggleMenu()">
          <div class="profile-icon">
            {{ initials }}
          </div>
          <i class="fa fa-chevron-down dropdown-arrow"></i>
        </div>

        <div class="dropdown" *ngIf="showMenu">
          <ul class="profile-dropdown">
            <li (click)="navigateTo('profile')">
              <i class="fa fa-user"></i>
              <span>Profile</span>
            </li>
            <li (click)="navigateTo('permissions')">
              <i class="fa fa-users-cog"></i>
              <span>Permissions</span>
            </li>
            <li (click)="navigateTo('preferences')">
              <i class="fa fa-sliders-h"></i>
              <span>Preferences</span>
            </li>
            <li (click)="navigateTo('support')">
              <i class="fa fa-comment-alt"></i>
              <span>Support</span>
            </li>

            <hr class="dropdown-divider" />

            <li (click)="onLogout()">
              <i class="fa fa-sign-out-alt"></i>
              <span>Sign out</span>
            </li>
          </ul>
        </div>
      </div>


      <!-- <div class="topbar-right">
        <div class="notifications" title="Notifications">🔔</div>
        <div class="profile">          
          <div class="avatar">RM</div>
        </div>
      </div> -->
    </header>

    <!-- Child pages load here -->
    <section class="dashboard-content">
      <router-outlet></router-outlet>
    </section>
  </div>
</div>
