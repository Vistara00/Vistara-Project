<div class="modal-overlay">
  <div class="modal">
<h3>Create New Booking</h3>
<div class="loader-overlay" *ngIf="loading">
  <div class="loader"></div>
</div>
<form (ngSubmit)="confirmBooking(bookingForm)" #bookingForm="ngForm">
  <div class="form-grid">
    <div class="form-group">
      <label>First Name</label>
      <input name="first_name" ngModel placeholder="e.g. John" required />
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input name="last_name" ngModel placeholder="e.g. Doe" required />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input name="email" ngModel type="email" placeholder="john.doe@example.com" required />
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input name="phone" ngModel placeholder="+254 ..." required />
    </div>

    <div class="form-group">
      <label>Booking Type</label>
      <select name="booking_type" ngModel required>
      <option value="Single" selected>Single</option>
      <option value="Group">Group</option>
      </select>

    </div>
    <div class="form-group">
      <label>Vehicle Number</label>
      <input name="vehicle_number" ngModel placeholder="KAA 001A" />
    </div>

    <div class="form-group">
      <label>No. Of People</label>
      <input name="people" ngModel type="number" min="1" required />
    </div>
    <div class="form-group">
      <label>Check-in Date</label>
      <input name="checkin_date" ngModel type="date" required />
    </div>

    <div class="form-group">
      <label>Check-out Date</label>
      <input name="checkout_date" ngModel type="date" required />
    </div>
    <div class="form-group">
      <label>Amount ($)</label>
      <input name="amount" ngModel type="number" step="0.01" placeholder="0.00" required />
    </div>
  </div>

  <div class="payment-methods">
    <label><input type="radio" name="payment" value="Cash" ngModel required /> Cash</label>
    <label><input type="radio" name="payment" value="Mpesa" ngModel /> M‑pesa</label>
    <label><input type="radio" name="payment" value="Ecitizen" ngModel /> E‑citizen</label>
  </div>

  <div class="actions">
    <button type="button" (click)="closeModal()">Cancel</button>
    <button type="submit" class="confirm-btn">Confirm Booking</button>
  </div>

  <div class="success-check" *ngIf="success">
    <img src="../assets/icons/checkmark.svg" alt="Success" />
  </div>
</form>

  </div>
</div>
