<div class="modal-overlay">
  <div class="modal">
    <h3>Create New Booking</h3>

    <form (ngSubmit)="confirmBooking(bookingForm)" #bookingForm="ngForm">
      <div class="form-grid">
        <input name="first_name" ngModel placeholder="First Name" required />
        <input name="last_name" ngModel placeholder="Last Name" required />
        <input name="email" ngModel type="email" placeholder="Email" required />
        <input name="phone" ngModel placeholder="Phone Number" required />

        <select name="booking_type" ngModel required>
          <option value="Single">Single</option>
          <option value="Group">Group</option>
        </select>

        <input name="vehicle_number" ngModel placeholder="Vehicle Number" />
        <input name="people" ngModel type="number" min="1" placeholder="No. of People" required />
        <input name="checkin_date" ngModel type="date" required />
        <input name="checkout_date" ngModel type="date" required />
        <input name="amount" ngModel type="number" step="0.01" placeholder="Amount" required />
      </div>

      <!-- Payment Method -->
      <div class="payment-methods">
        <label><input type="radio" name="payment" value="Cash" ngModel required /> Cash</label>
        <label><input type="radio" name="payment" value="Mpesa" ngModel /> M‑pesa</label>
        <label><input type="radio" name="payment" value="Ecitizen" ngModel /> E‑citizen</label>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button type="button" (click)="closeModal()">Cancel</button>
        <button type="submit" class="confirm-btn">Confirm Booking</button>
      </div>
    </form>

    <!-- Preloader -->
    <div class="loader" *ngIf="loading"></div>
    <div class="success-check" *ngIf="success"></div>
  </div>
</div>
